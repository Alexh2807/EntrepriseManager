# ==================================================================
# CONFIGURATION MDT RUSH (STYLE FUNCRAFT HARDCORE V2)
# ==================================================================

enabled: true
world-name: "mdt"

game:
  max-duration: 1800         # 30 minutes par defaut (en secondes)
  max-bonus-hearts: 4
  tnt-fly-enabled: true
  tnt-damage-self: 2.0
  tnt-damage-teammates: 0.0
  void-kill-height: -35      # Hauteur Y en dessous de laquelle les joueurs meurent

# Systeme de points
points:
  kill: 1                    # +1 point par kill
  bed-destroy: 10            # +10 points par lit detruit

timers:
  join-period: 10          # 1 minute pour rejoindre apres /mdt start
  lobby-countdown: 10      # 1 minute d'attente dans le lobby
  pre-game: 5              # 5 secondes avant le debut

teams:
  min-players: 1           # Minimum par equipe (1v1 possible)
  max-players: 5           # Maximum par equipe (5v5)

# Générateur UNIQUE (Présent sur les 6 îles)
# Tout sort du même bloc !
generators:
  brick:
    material: BRICK
    name: "&cBrique"
    interval: 1       # 1 seconde
    max-stack: 64
    spawn-at-base: true
    
  iron:
    material: IRON_INGOT
    name: "&fFer"
    interval: 15      # 15 secondes
    max-stack: 16
    spawn-at-base: true
    
  gold:
    material: GOLD_INGOT
    name: "&6Or"
    interval: 60      # 1 minute
    max-stack: 8
    spawn-at-base: true
    
  diamond:
    material: DIAMOND
    name: "&bDiamant"
    interval: 300     # 5 minutes
    max-stack: 4
    spawn-at-base: true # Oui, sur toutes les îles !

# LES 4 GRANDS MARCHANDS SPÉCIALISÉS
# (Le Petit marchand vendra tout ça mélangé)
shops:
  blocks:
    title: "&8Blocs & Outils"
    items:
      - item: SANDSTONE
        amount: 32
        price-material: BRICK
        price-amount: 4
        name: "&eGrès"
      - item: END_STONE
        amount: 1
        price-material: IRON_INGOT
        price-amount: 4
        name: "&fPierre de l'End"
      - item: OBSIDIAN
        amount: 1
        price-material: GOLD_INGOT
        price-amount: 8
        name: "&0Obsidienne"
      - item: WOODEN_PICKAXE
        amount: 1
        price-material: BRICK
        price-amount: 10
        enchantments: ["DIG_SPEED:1"]
      - item: IRON_PICKAXE
        amount: 1
        price-material: IRON_INGOT
        price-amount: 5
        enchantments: ["DIG_SPEED:2"]
      - item: DIAMOND_PICKAXE
        amount: 1
        price-material: GOLD_INGOT
        price-amount: 2
        enchantments: ["DIG_SPEED:3"]

  weapons:
    title: "&cArmes"
    items:
      - item: STICK
        amount: 1
        price-material: BRICK
        price-amount: 10
        enchantments: ["KNOCKBACK:1"]
        name: "&dBâton de recul"
      - item: IRON_SWORD
        amount: 1
        price-material: IRON_INGOT
        price-amount: 1
      - item: DIAMOND_SWORD
        amount: 1
        price-material: GOLD_INGOT
        price-amount: 1
      - item: BOW
        amount: 1
        price-material: IRON_INGOT
        price-amount: 10
      - item: ARROW
        amount: 8
        price-material: IRON_INGOT
        price-amount: 2

  armor:
    title: "&9Armures"
    items:
      - item: CHAINMAIL_HELMET
        amount: 1
        price-material: IRON_INGOT
        price-amount: 2
      - item: CHAINMAIL_CHESTPLATE
        amount: 1
        price-material: IRON_INGOT
        price-amount: 5
      - item: CHAINMAIL_LEGGINGS
        amount: 1
        price-material: IRON_INGOT
        price-amount: 4
      - item: CHAINMAIL_BOOTS
        amount: 1
        price-material: IRON_INGOT
        price-amount: 2
      - item: IRON_CHESTPLATE
        amount: 1
        price-material: GOLD_INGOT
        price-amount: 5

  special:
    title: "&5Spécial & Potions"
    items:
      - item: GOLDEN_APPLE
        amount: 1
        price-material: GOLD_INGOT
        price-amount: 3
      - item: TNT
        amount: 1
        price-material: GOLD_INGOT
        price-amount: 4
      - item: FLINT_AND_STEEL
        amount: 1
        price-material: IRON_INGOT
        price-amount: 1
      - item: ENDER_PEARL
        amount: 1
        price-material: DIAMOND
        price-amount: 2
      # Items custom (format: custom:<id> depuis custom_items.yml)
      - item: "custom:dynamite"
        amount: 1
        price-material: DIAMOND
        price-amount: 2
        name: "&cDynamite"

