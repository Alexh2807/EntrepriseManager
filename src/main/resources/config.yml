    broadcast: "&8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬\n&c&l🚨 EMPRISONNEMENT\n&8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬\n&7Prisonnier: &e%prisoner%\n&7Durée: &c%duration% minutes\n&7Raison: &f%reason%\n&8▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬▬"




# ============================================
#        SYSTÈME DE BOUTIQUES (SHOPS)
# ============================================
# Configuration du système de boutiques physiques avec validation d'intégrité

shop-system:
  # === LIMITES ===
  max-shops-per-entreprise: 10
  max-distance-chest-sign: 1

  # === ÉCONOMIE ===
  creation-cost: 0.0

  # === VALIDATION ET INTÉGRITÉ ===
  integrity-check-interval: 300    # 5 minutes
  auto-repair-enabled: true        # Réparer automatiquement les composants manquants
  auto-delete-broken-shops: true   # Supprimer les boutiques cassées

  # === SAUVEGARDE ===
  auto-save-interval: 600          # 10 minutes
  backup-keep-count: 10

  # === AFFICHAGE VISUEL ===
  hologram-enabled: true

# ========================================
# SUPPRESSION AUTOMATIQUE DES SHOPS
# ========================================
# Configuration de la suppression automatique des boutiques
# lors d'événements liés aux villes et terrains
shop-deletion-on-events:
  # Supprimer les shops quand un membre quitte une ville volontairement
  resident-leave-town: true

  # Supprimer les shops quand un membre est expulsé d'une ville
  resident-kick-from-town: true

  # Supprimer les shops de l'ancien propriétaire quand un terrain change de propriétaire
  plot-owner-change: true

  # Supprimer tous les shops quand un terrain est nettoyé (clearOwner)
  plot-clear: true

  # Supprimer tous les shops quand un terrain change de type (ex: PROFESSIONNEL → MUNICIPAL)
  plot-type-change: true

  # Supprimer tous les shops quand un terrain est unclaimed par la ville
  town-unclaim-plot: true

  # Supprimer tous les shops quand une ville est supprimée
  town-ruin: true

# Configuration des hologrammes de shops
shop-holograms:
  base-height: 0.05           # Hauteur de base au-dessus du coffre
  line-spacing: 0.15          # Espacement entre les lignes
  item-display:
    scale: 0.6                # Taille de l'item affiché
    offset-below: 0.3         # Distance item/texte




# ============================================
#        OPTIMISATIONS TECHNIQUES
# ============================================
