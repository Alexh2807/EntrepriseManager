    - "ENDER_CHEST"
    - "BARREL"
    - "HOPPER"
    - "DROPPER"
    - "DISPENSER"
    - "FURNACE"
    - "BLAST_FURNACE"
    - "SMOKER"
    - "CRAFTING_TABLE"
    - "ENCHANTING_TABLE"
    - "ANVIL"
    - "CHIPPED_ANVIL"
    - "DAMAGED_ANVIL"
    - "BEACON"
    - "BREWING_STAND"
    - "CAULDRON"
    - "LECTERN"
    - "SPAWNER"
    - "BEDROCK"
