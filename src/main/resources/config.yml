# ============================================
#          SYSTÈME DE VILLE (TOWN)
# ============================================
# Gestion complète des villes avec système de progression,
# services municipaux (police, justice, hôpital), et finances

town:
  # === COÛTS DE BASE ===
  creation-cost: 5000.0      # Coût pour créer une ville
  join-cost: 100.0            # Frais d'entrée versés à la banque de la ville
  rename-cost: 5000.0         # Coût pour renommer une ville

  # === GESTION DES PARCELLES ===
  claim-cost-per-chunk: 500.0         # Coût par chunk pour claim
  unclaim-refund-percentage: 50.0     # Pourcentage récupéré lors du unclaim

  # === INVITATIONS ===
  invitation-expiration-hours: 24     # Durée de validité des invitations

  # === SYSTÈME D'ÉVOLUTION DES VILLES ===
  # Progression: Campement → Village → Ville
  # Les villes évoluent selon leur population et leurs finances
  levels:
    # NIVEAU 1 : CAMPEMENT (1-4 joueurs)
    # Petite communauté de départ sans services municipaux
    campement:
      creation-cost: 5000.0
      upgrade-cost: 0
      min-population: 1
      max-population: 6
      max-claims: 20
      bank-limit: 5000.0          # Limite de solde bancaire
      max-policiers: 0
      max-juges: 0
      max-medecins: 0
      police-enabled: false
      justice-enabled: false
      hospital-enabled: false

    # NIVEAU 2 : VILLAGE (5-14 joueurs)
    # Communauté établie avec services de base
    village:
      creation-cost: 13000.0      # Coût total depuis le début (5000 + 8000)
      upgrade-cost: 4500.0        # Coût pour passer de Campement à Village
      min-population: 5
      max-population: 14
      max-claims: 130
      bank-limit: 20000.0         # Limite de solde bancaire
      max-policiers: 1
      max-juges: 1
      max-medecins: 2
      police-enabled: true
      justice-enabled: true
      hospital-enabled: true

    # NIVEAU 3 : VILLE (15+ joueurs)
    # Grande ville prospère avec tous les services
    ville:
      creation-cost: 28000.0      # Coût total depuis le début (5000 + 8000 + 15000)
      upgrade-cost: 15000.0       # Coût pour passer de Village à Ville
      min-population: 12
      max-population: 29
      max-claims: 250
      bank-limit: 50000.0         # Limite de solde bancaire
      max-policiers: 5
      max-juges: 5
      max-medecins: 10
      police-enabled: true
      justice-enabled: true
      hospital-enabled: true

  # === SYSTÈME DE COMMISSIONS ===
  commissions:
    # Pourcentage de l'amende qui va au policier quand elle est payée
    police-commission-percentage: 75.0
    # Pourcentage des frais de justice qui va au juge
    judge-commission-percentage: 75.0
    # Frais de justice en pourcentage de l'amende
    court-fees-percentage: 30.0

  # === AMENDES PRÉDÉFINIES ===
  predefined-fines:
    - title: "Trouble à l'ordre public"
      amount: 300.0
      description: "Comportement perturbant l'ordre public"
    - title: "Vol de bien"
      amount: 500.0
      description: "Vol ou tentative de vol de biens"
    - title: "Agression physique"
      amount: 400.0
      description: "Agression physique sur une personne"
    - title: "Dégradation de propriété"
      amount: 750.0
      description: "Destruction ou dégradation de biens publics ou privés"
    - title: "Non-respect des autorités"
      amount: 200.0
      description: "Refus d'obtempérer aux ordres des forces de l'ordre"
    - title: "Fraude commerciale"
      amount: 1000.0
      description: "Pratiques commerciales frauduleuses"
    - title: "Trouble de voisinage"
      amount: 250.0
      description: "Nuisances sonores ou comportement gênant les voisins"




# ============================================
